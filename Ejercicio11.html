<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
     <link rel="stylesheet" href="css/Ejercicio11.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Km a Mi </title>
     <script src="js/Ejercicio11.js"></script>
</head>
<body>
     <div class="contenedor-formulario">
      <h1>Mi Segundo Convertidor</h1>
    <form class="">
        <label for="numero">Convertidor de Kilometros a Millas: </label>

        <input type="number" id="numero" name="numero" step="1" onkeydown="return !['-','+','e','E'].includes(event.key)"  min="0" placeholder="Escribe la distancia en Kilometros">

    <button type="button" onclick="convertir()">Convertir a Millas</button>

    <!-- readonly: el usuario puede leerlo y se envía en el form, pero NO PUEDE editarlo. -->
<input type="text" id="resultado" name="resultado" readonly>
<input type="reset" id="btnlimpiar" value="Limpiar todo">
    </form>
    </div>
</body>
</html>
