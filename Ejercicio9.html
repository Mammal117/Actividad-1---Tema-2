<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="css/Ejercicio9.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto | DevSolutions</title>
</head>
<body>
  <div class="contenedor-formulario">
    <h1>Contactanos</h1>
    <p class="subtitulo">¿Tienes dudas? Escribenos y te responderemos en 24h.</p>
    <form class="formulario">
        <!--Grupo 1: Datos Basicos-->
        <div class="grupo-formulario">
            <label for="nombre">Nombre completo</label>
            <input type="text" id="nombre" placeholder="Ej: Ana Perez" required>
        </div>
        <!--Grupo2: email y telefono-->
        <div class="grupo-doble">
            <div class="grupo-formulario">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="ana@ejemplo.com" required>
            </div>
            <div class="grupo-formulario">
                <label for="telefono">Telefono<span>(opcional)</span></label>
                <input type="tel" id="telefono" placeholder="+52 55 1234 5678">
            </div>
        </div>
        <!-- Grupo 3: Mensaje-->
         <div class="grupo-formulario">
            <label for="mensaje">Mensaje</label>
            <textarea id="mensaje" rows="5" placeholder="Describe tu consuta..." required></textarea>
         </div>
         <!--Boton-->
         <button type="submit" class="boton-enviar">Enviar mensaje<span>-></span></button>
    </form>
  </div>  
</body>
</html>
