<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manipulación del DOM</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/Ejercicio18.css">
</head>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<body>

    <div class="container py-5" style="max-width: 600px;">

        <div class="card shadow-sm">
            <div class="card-body p-4">

                <h1 class="h3 text-center mb-4">Agregar y Eliminar Elementos</h1>

                <!-- Campo de texto y boton para agregar -->
                <div class="input-group mb-4">
                    <input type="text" id="nuevoElemento" class="form-control" placeholder="Escribe algo">
                    <button id="agregarBtn" class="btn btn-primary">Agregar</button>
                </div>

                <!-- Aqui se van a mostrar los elementos agregados -->
                <ul id="lista" class="list-group"></ul>

            </div>
        </div>

    </div>

    <script src="js/Ejercicio18.js"></script>
</body>
</html>
